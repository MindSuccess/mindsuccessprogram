<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D76E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C9971C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="darkGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6508;stop-opacity:1" />
    </linearGradient>
    <filter id="emboss">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset dx="1" dy="1" in="blur" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="50" cy="50" r="48" fill="url(#goldGrad)" />

  <!-- Inner dark gold background -->
  <circle cx="50" cy="50" r="44" fill="url(#darkGold)" />

  <!-- Subtle inner highlight ring -->
  <circle cx="50" cy="50" r="43" fill="none" stroke="#F5D76E" stroke-width="0.5" opacity="0.4"/>

  <!-- Mountain peak (upward arrow) inside circle, above MSP -->
  <!-- Left mountain (smaller) -->
  <polygon points="28,46 36,30 44,46" fill="#F5D76E" opacity="0.5"/>
  <!-- Main center peak -->
  <polygon points="34,46 50,18 66,46" fill="url(#goldGrad)"/>
  <!-- Snow cap highlight -->
  <polygon points="46,26 50,18 54,26" fill="#FFFFFF" opacity="0.6"/>

  <!-- Horizontal base line -->
  <line x1="22" y1="46" x2="78" y2="46" stroke="#F5D76E" stroke-width="1" opacity="0.6"/>

  <!-- MSP text embossed below the mountain -->
  <text x="50" y="72" 
        font-family="Georgia, serif" 
        font-size="20" 
        font-weight="900" 
        fill="#F5D76E"
        text-anchor="middle"
        filter="url(#emboss)"
        letter-spacing="2">MSP</text>

  <!-- Subtle shadow for emboss effect on text -->
  <text x="51" y="73" 
        font-family="Georgia, serif" 
        font-size="20" 
        font-weight="900" 
        fill="#8B6508"
        text-anchor="middle"
        opacity="0.5"
        letter-spacing="2">MSP</text>
  <text x="50" y="72" 
        font-family="Georgia, serif" 
        font-size="20" 
        font-weight="900" 
        fill="#F5D76E"
        text-anchor="middle"
        letter-spacing="2">MSP</text>

</svg>
