  <!-- Star/spark at top -->
  <circle cx="30" cy="8" r="3" fill="#F5D76E"/>
  <!-- Text -->
  <text x="50" y="38" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="0">Mind</text>
  <text x="96" y="38" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#D4AF37" letter-spacing="0">Success</text>
