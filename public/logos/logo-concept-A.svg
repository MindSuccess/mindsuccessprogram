<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="goldA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D76E"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
  </defs>
  <!-- Upward arrow / mountain peak icon -->
  <polygon points="22,48 30,20 38,48" fill="none" stroke="url(#goldA)" stroke-width="3" stroke-linejoin="round"/>
